apiVersion: v1
kind: Namespace
metadata:
  name: eshoponweb-user010

---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: eshoponweb-user010
  name: webapp
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      service: webapp
  template:
    metadata:
      labels:
        app: sample-app
        service: webapp
    spec:
      containers:
        - name: webapp
          image: eshoponweb-webapp-user010webapp:1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: http://+:80
            - name: WebApiBaseAddress
              value: http://webapi
